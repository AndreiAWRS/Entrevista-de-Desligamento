<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Entrevista de Desligamento</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
      color: #333;
    }
    header {
      background: #007bff;
      color: #fff;
      padding: 20px;
      text-align: center;
    }
    header h1 {
      margin: 0;
      font-size: 28px;
    }
    .container {
      max-width: 900px;
      margin: 30px auto;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      padding: 20px;
      margin-bottom: 30px;
    }
    h2 {
      margin-top: 0;
      color: #007bff;
    }
    input, textarea {
      margin: 8px 0;
      padding: 10px;
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    button {
      margin-top: 10px;
      padding: 10px 15px;
      background: #007bff;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #0056b3;
    }
    ul {
      padding-left: 20px;
    }
    canvas {
      margin-top: 20px;
    }
  </style>
</head>
<body>

<header>
  <h1>Plataforma de Entrevista de Desligamento</h1>
</header>

<div class="container">

  <!-- Área do Master/Admin -->
  <div class="card admin">
    <h2>Painel do Master</h2>
    <label>Nova Pergunta:</label>
    <input type="text" id="novaPergunta" placeholder="Digite a pergunta">
    <button onclick="adicionarPergunta()">Adicionar Pergunta</button>
    <ul id="listaPerguntas"></ul>
  </div>

  <!-- Formulário de Entrevista -->
  <div class="card formulario">
    <h2>Formulário</h2>
    <form id="formEntrevista">
