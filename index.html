<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>ENTREVISTA DE DESLIGAMENTO</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f4f6f9; }
    header { background: #dc3545; color: #fff; padding: 20px; text-align: center; }
    header h1 { margin: 0; font-size: 28px; text-transform: uppercase; }

    nav { 
      background: #333; 
      overflow: hidden; 
      display: none; 
    }
    nav ul { 
      list-style-type: none; 
      margin: 0; 
      padding: 0; 
    }
    nav li { 
      float: left; 
      position: relative; 
    }
    nav li a { 
      display: block; 
      color: #fff; 
      text-align: center; 
      padding: 14px 20px; 
      text-decoration: none; 
      font-weight: 500;
    }
    nav li a:hover { 
      background-color: #111; 
    }

    /* Estilo específico para o botão SAIR */
    nav li .sair {
      background: #dc3545 !important;
      margin: 4px 8px;
      padding: 10px 18px !important;
      border-radius: 4px;
    }
    nav li .sair:hover {
      background: #a71d2a !important;
    }

    nav li ul { 
      display: none; 
      position: absolute; 
      background-color: #444; 
      min-width: 160px; 
      z-index: 1; 
    }
    nav li ul li { float: none; }
    nav li ul li a { padding: 12px 16px; }
    nav li:hover ul { display: block; }

    .container { max-width: 900px; margin: 30px auto; padding: 20px; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 30px; }
    h2 { color: #007bff; }
    input, textarea { margin: 8px 0; padding: 10px; width: 100%; border: 1px solid #ccc; border-radius: 4px; }
    button { margin-top: 10px; padding: 10px 15px; background: #007bff; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0056b3; }
  </style>
</head>
<body>
<header>
  <h1>ENTREVISTA DE DESLIGAMENTO</h1>
</header>

<!-- Tela de Login -->
<div class="container" id="loginCard">
  <div class="card">
    <h2>Login</h2>
    <input type="text" id="loginUser" placeholder="Usuário">
    <input type="password" id="loginPass" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<!-- Menu -->
<nav id="menuNav">
  <ul id="menuMaster">
    <li><a href="#">CRIAR</a>
      <ul>
        <li><a href="#" onclick="mostrar('usuarios')">Usuários</a></li>
      </ul>
    </li>
    <li><a href="#">FORMULÁRIO</a>
      <ul>
        <li><a href="#" onclick="mostrar('perguntas')">Perguntas</a></li>
        <li><a href="#" onclick="mostrar('formulario')">Formulário</a></li>
      </ul>
    </li>
    <li><a href="#">DASHBOARD</a>
      <ul>
        <li><a href="#" onclick="mostrar('dashboard')">Gráficos</a></li>
      </ul>
    </li>
    <li style="float:right"><a href="#" class="sair" onclick="logout()">SAIR</a></li>
  </ul>

  <ul id="menuUser">
    <li><a href="#">FORMULÁRIO</a>
      <ul>
        <li><a href="#" onclick="mostrar('formulario')">Formulário</a></li>
      </ul>
    </li>
    <li style="float:right"><a href="#" class="sair" onclick="logout()">SAIR</a></li>
  </ul>
</nav>

<!-- Resto do conteúdo permanece igual -->
<div class="container">
  <!-- ... (usuários, perguntas, formulário, dashboard) ... -->
</div>

<script>
  // ... (todo o JavaScript permanece o mesmo da versão anterior) ...
</script>
</body>
</html>
