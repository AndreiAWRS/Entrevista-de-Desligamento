<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>ENTREVISTA DE DESLIGAMENTO</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f4f6f9; }
    header { background: #dc3545; color: #fff; padding: 20px; text-align: center; }
    header h1 { margin: 0; font-size: 28px; text-transform: uppercase; }

    /* Barra de menu */
    nav { background: #333; overflow: hidden; display:none; }
    nav ul { list-style-type: none; margin: 0; padding: 0; }
    nav li { float: left; position: relative; }
    nav li a { display: block; color: #fff; text-align: center; padding: 14px 20px; text-decoration: none; }
    nav li a:hover { background-color: #111; }
    nav li ul { display: none; position: absolute; background-color: #444; min-width: 160px; z-index: 1; }
    nav li ul li { float: none; }
    nav li ul li a { padding: 12px 16px; }
    nav li:hover ul { display: block; }

    .container { max-width: 900px; margin: 30px auto; padding: 20px; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 30px; }
    h2 { color: #007bff; }
    input, textarea { margin: 8px 0; padding: 10px; width: 100%; border: 1px solid #ccc; border-radius: 4px; }
    button { margin-top: 10px; padding: 10px 15px; background: #007bff; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0056b3; }
  </style>
</head>
<body>

<header>
  <h1>ENTREVISTA DE DESLIGAMENTO</h1>
</header>

<!-- Tela de Login -->
<div class="container" id="loginCard">
  <div class="card">
    <h2>Login</h2>
    <input type="text" id="loginUser" placeholder="Usuário">
    <input type="password" id="loginPass" placeholder="Senha">
    <button onclick="login()">Entrar</button>
  </div>
</div>

<!-- Menu suspenso -->
<nav id="menuNav">
  <ul id="menuMaster">
    <li><a href="#">CRIAR</a>
      <ul>
        <li><a href="#" onclick="mostrar('usuarios')">Usuários</a></li>
      </ul>
    </li>
    <li><a href="#">FORMULÁRIO</a>
      <ul>
        <li><a href="#" onclick="mostrar('perguntas')">Perguntas</a></li>
        <li><a href="#" onclick="mostrar('formulario')">Formulário</a></li>
      </ul>
    </li>
    <li><a href="#">DASHBOARD</a>
      <ul>
        <li><a href="#" onclick="mostrar('dashboard')">Gráficos</a></li>
      </ul>
    </li>
  </ul>
  <ul id="menuUser">
    <li><a href="#">FORMULÁRIO</a>
      <ul>
        <li><a href="#" onclick="mostrar('formulario')">Formulário</a></li>
      </ul>
    </li>
  </ul>
</nav>

<div class="container">

  <!-- Criar Usuários -->
  <div class="card" id="usuarios" style="display:none;">
    <h2>Criar Usuário</h2>
    <input type="text" id="novoUser" placeholder="Login do usuário">
    <input type="password" id="novoPass" placeholder="Senha do usuário">
    <button onclick="criarUsuario()">Criar Usuário</button>
    <ul id="listaUsuarios"></ul>
  </div>

  <!-- Perguntas -->
  <div class="card" id="perguntas" style="display:none;">
    <h2>Perguntas</h2>
    <label>Nova Pergunta:</label>
    <input type="text" id="novaPergunta" placeholder="Digite a pergunta">
    <button onclick="adicionarPergunta()">Adicionar Pergunta</button>
    <ul id="listaPerguntas"></ul>
  </div>

  <!-- Formulário -->
  <div class="card" id="formulario" style="display:none;">
    <h2>Formulário</h2>
    <form id="formEntrevista"></form>
    <button onclick="salvarRespostas()">Enviar Respostas</button>
  </div>

  <!-- Dashboard -->
  <div class="card" id="dashboard" style="display:none;">
    <h2>Dashboard</h2>
    <canvas id="graficoRespostas" width="400" height="200"></canvas>
  </div>

</div>

<script>
  let usuarios = [{login:"andrei", senha:"#Andrei1996", master:true}];
  let perguntas = ["Como você avalia sua experiência na empresa?", "O que poderia ser melhorado?"];
  let respostas = [];
  let usuarioLogado = null;

  function login(){
    const user = document.getElementById("loginUser").value;
    const pass = document.getElementById("loginPass").value;
    const encontrado = usuarios.find(u => u.login===user && u.senha===pass);
    if(encontrado){
      usuarioLogado = encontrado;
      document.getElementById("loginCard").style.display="none";
      document.getElementById("menuNav").style.display="block";
      if(encontrado.master){
        document.getElementById("menuMaster").style.display="block";
        document.getElementById("menuUser").style.display="none";
      } else {
        document.getElementById("menuMaster").style.display="none";
        document.getElementById("menuUser").style.display="block";
      }
    } else {
      alert("Usuário ou senha inválidos!");
    }
  }

  function mostrar(secao){
    document.getElementById("usuarios").style.display="none";
    document.getElementById("perguntas").style.display="none";
    document.getElementById("formulario").style.display="none";
    document.getElementById("dashboard").style.display="none";
    document.getElementById(secao).style.display="block";
    if(secao==="perguntas") renderizarPerguntas();
    if(secao==="formulario") renderizarPerguntas();
    if(secao==="dashboard") gerarGrafico();
    if(secao==="usuarios") renderizarUsuarios();
  }

  function adicionarPergunta() {
    const nova = document.getElementById("novaPergunta").value;
    if (nova) {
      perguntas.push(nova);
      document.getElementById("novaPergunta").value = "";
      renderizarPerguntas();
    }
  }

  function renderizarPerguntas() {
    const lista = document.getElementById("listaPerguntas");
    const form = document.getElementById("formEntrevista");
    if(lista) lista.innerHTML = "";
    if(form) form.innerHTML = "";

    perguntas.forEach((p, i) => {
      if(lista){
        const li = document.createElement("li");
        li.textContent = p;
        lista.appendChild(li);
      }
      if(form){
        const label = document.createElement("label");
        label.textContent = p;
        const input = document.createElement("textarea");
        input.id = "resposta_" + i;
        form.appendChild(label);
        form.appendChild(input);
      }
    });
  }

  function salvarRespostas() {
    const respostaAtual = perguntas.map((p, i) => document.getElementById("resposta_" + i)?.value || "");
    respostas.push(respostaAtual);
    alert("Respostas salvas!");
  }

  function gerarGrafico() {
    const ctx = document.getElementById("graficoRespostas").getContext("2d");
    const dados = perguntas.map((p, i) => respostas.filter(r => r[i] !== "").length);

    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: perguntas,
        datasets: [{
          label: 'Número de respostas',
          data: dados,
          backgroundColor: 'rgba(220, 53, 69, 0.6)' // vermelho
        }]
      }
    });
  }

  function criarUsuario(){
    const novoUser = document.getElementBy
  function criarUsuario(){
    const novoUser = document.getElementById("novoUser").value;
    const novoPass = document.getElementById("novoPass").value;
    if(novoUser && novoPass){
      usuarios.push({login:novoUser, senha:novoPass, master:false});
      document.getElementById("novoUser").value="";
      document.getElementById("novoPass").value="";
      renderizarUsuarios();
      alert("Usuário criado com sucesso!");
    } else {
      alert("Preencha login e senha!");
    }
  }

  function renderizarUsuarios(){
    const lista = document.getElementById("listaUsuarios");
    lista.innerHTML="";
    usuarios.forEach(u=>{
      const li=document.createElement("li");
      li.textContent = u.login + (u.master?" (master)":"");
      lista.appendChild(li);
    });
  }
</script>

</body>
</html>
